# fly.toml app configuration file generated for practica-fly on 2026-07-14T23:41:35Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'practica-fly'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
